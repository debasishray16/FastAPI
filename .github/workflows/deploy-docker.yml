name: Deploy FastAPI with Docker to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy Docker container to VM via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          script: |
            # Create FastAPI-Docker folder if it doesn't exist
            mkdir -p /home/${{ secrets.VM_USER }}/FastAPI-Docker
            
            cd /home/${{ secrets.VM_USER }}/FastAPI-Docker
            
            # Initialize git repo if it doesn't exist
            if [ ! -d .git ]; then
              git init
              git remote add origin ${{ github.server_url }}/${{ github.repository }}.git
            fi
            
            # Pull latest code
            git pull origin main
            
            # Remove old container if exists
            docker stop fastapi-app || true
            docker rm fastapi-app || true
            
            # Build new image
            docker build -t fastapi-app:latest .
            
            # Run new container
            docker run -d \
              --name fastapi-app \
              -p 8000:8000 \
              --restart unless-stopped \
              fastapi-app:latest
            
            # Wait for container to start
            sleep 5
            
            # Verify container is running
            echo "=== Checking Docker Container Status ==="
            docker ps --filter "name=fastapi-app"
            
            # Check container logs
            echo "=== Container Logs ==="
            docker logs fastapi-app
            
            # Verify the app is responding
            echo "=== Verifying Application Health ==="
            if curl -s http://localhost:8000/ | grep -q "Welcome to FastAPI"; then
              echo "✓ FastAPI is running and responding!"
            else
              echo "✗ FastAPI is not responding properly"
              exit 1
            fi
            
            echo "✓ Docker deployment completed successfully!"
